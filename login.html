<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop Login</title>
    <link rel="stylesheet" href="">
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
 
}

.login-container{
    width:100%;
    padding:20px;
}

.login-box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);

    animation:fadeIn 1s ease;
}

.login-box h1{
    text-align:center;
    color:#6f4e37;
    margin-bottom:10px;
}

.login-box h3{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.login-box input:focus{
    outline:none;
    border-color:#6f4e37;
}

.login-box button{
    width:100%;
    padding:14px;
    background:#6f4e37;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

.login-box button:hover{
    background:#4b2e20;
}

.login-box p{
    text-align:center;
    margin-top:15px;
}

.login-box a{
    color:#6f4e37;
    text-decoration:none;
    font-weight:bold;
}




    </style>
</head>
<body>

    <div class="login-container">

        <div class="login-box">

            <h1>☕ Coffee Shop</h1>
            <h3>Login Account</h3>

            <form>

                <input type="email" placeholder="Email Address" required>

                <input type="password" placeholder="Password" required>

                <button type="submit">Submit</button>

            </form>

            <p>
                Don't have an account?
                <a href="registration.html"> Registration</a>
            </p>

        </div>

    </div>

</body>
</html>
