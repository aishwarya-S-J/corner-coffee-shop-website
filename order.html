<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Order Form</title>
    <link rel="stylesheet" href="orderp.css">
</head>
<body>

<section class="order-section">

    <div class="order-container">

        <div class="image-box">
            <h1>☕</h1>
        </div>

        <div class="form-box">

            <h1>Order Your Coffee</h1>

            <form>

                <input type="text" placeholder="Customer Name" required>

                <input type="email" placeholder="Email Address" required>

                <input type="tel" placeholder="Mobile Number" required>

                <select required>
                    <option>Select Coffee</option>
                    <option>Cappuccino</option>
                    <option>Americano</option>
                    <option>Cold Brew</option>
                    <option>Nescafe</option>
                    <option>Organic Coffee</option>
                </select>

                <input type="number" placeholder="Quantity" min="1">

                <textarea rows="4" placeholder="Delivery Address"></textarea>

                <button type="submit">Place Order</button>

            </form>

        </div>

    </div>

</section>

</body>
</html>
