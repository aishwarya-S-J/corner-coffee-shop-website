<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop Registration</title>
    <link rel="stylesheet" href="">

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #2c1810,
        #6f4e37,
        #d2b48c
    );
    padding:20px;
}

.register-container{
    width:100%;
}

.register-box{
    max-width:450px;
    margin:auto;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:fadeIn 0.8s ease;
}

.register-box h1{
    text-align:center;
    color:#6f4e37;
    margin-bottom:10px;
}

.register-box h3{
    text-align:center;
    color:#777;
    margin-bottom:25px;
}

.register-box input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.register-box input:focus{
    outline:none;
    border-color:#6f4e37;
}

.register-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#6f4e37;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.register-box button:hover{
    background:#4b2e20;
}

.register-box p{
    text-align:center;
    margin-top:15px;
}

.register-box a{
    color:#6f4e37;
    text-decoration:none;
    font-weight:bold;
}


    </style>
</head>
<body>

<div class="register-container">

    <div class="register-box">

        <h1>☕ Coffee Shop</h1>
        <h3>Create Account</h3>

        <form>

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="tel" placeholder="Mobile Number" required>

            <input type="password" placeholder="Password" required>

            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Submit</button>

        </form>

        <p>
            Already have an account?
            <a href="login.html">Login</a>
        </p>

    </div>

</div>

</body>
</html>
